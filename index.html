<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="https://xbdprjxvtwfieiqncbez.supabase.co/storage/v1/object/public/Logo/Gemini_Generated_Image_.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Ava Kirolos Scout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold:    #c9a84c;
            --gold-lt: #e8d5a3;
            --silver:  #c0c0c0;
            --dark:    #0d0d0d;
            --dark2:   #1a1a1a;
            --dark3:   #242424;
            --border:  rgba(201,168,76,0.25);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark);
            color: var(--silver);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, #a8832a 100%);
            color: #0d0d0d;
            font-weight: 700;
            transition: all 0.2s;
        }
        .btn-gold:hover { filter: brightness(1.15); transform: translateY(-1px); }
        .btn-gold:disabled { opacity: 0.6; cursor: not-allowed; }

        .form-input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 2.5rem; /* زودت مساحة على الشمال عشان العين */
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 8px;
            background: var(--dark3);
            color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,0.15); }
        
        .input-icon {
            position: absolute;
            right: 12px;
            top: 38px;
            color: var(--gold);
            font-size: 0.9rem;
        }
        
        .eye-icon-btn {
            position: absolute;
            left: 12px;
            color: gray;
            background: none;
            border: none;
            cursor: pointer;
            transition: color 0.2s;
        }
        .eye-icon-btn:hover { color: var(--gold); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="text-center p-8 border-b border-[rgba(201,168,76,0.15)] bg-[linear-gradient(135deg,var(--dark3),var(--dark2))]">
            <img src="https://xbdprjxvtwfieiqncbez.supabase.co/storage/v1/object/public/Logo/Gemini_Generated_Image_.png" 
                 alt="Logo" class="w-20 h-20 mx-auto rounded-full object-contain mb-4" style="border: 2px solid var(--gold); box-shadow: 0 0 20px rgba(201,168,76,0.3);">
            <h1 class="text-xl font-bold text-white tracking-wide">مجموعة آفا كيرلس الكشفية</h1>
            <p class="text-xs text-gray-500 mt-1">نظام إدارة الكشافة الموحد</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)" class="p-6 md:p-8 space-y-5">
            <div class="relative">
                <label class="block text-xs font-bold text-gray-400 mb-2">اسم المستخدم</label>
                <input type="text" id="username" class="form-input" placeholder="اكتب اسم المستخدم" required>
                <i class="fa-solid fa-user input-icon"></i>
            </div>
            
            <div class="relative">
                <label class="block text-xs font-bold text-gray-400 mb-2">كلمة المرور</label>
                <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                <i class="fa-solid fa-lock input-icon"></i>
                <button type="button" class="eye-icon-btn top-[38px]" onclick="togglePassword('password', 'loginEye')">
                    <i id="loginEye" class="fa-regular fa-eye-slash"></i>
                </button>
            </div>

            <div class="pt-2">
                <button type="submit" id="loginBtn" class="btn-gold w-full py-3 rounded-lg flex items-center justify-center gap-2 text-base">
                    <i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول
                </button>
            </div>
            <div class="text-center pt-4 border-t border-[rgba(201,168,76,0.15)] mt-4">
                <p class="text-sm text-gray-400">قائد جديد؟ <button type="button" onclick="openSignupModal()" class="text-[var(--gold)] font-bold hover:underline">سجل حسابك من هنا</button></p>
            </div>
        </form>
    </div>

    <div id="signupModal" class="fixed inset-0 bg-black bg-opacity-80 hidden flex items-center justify-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-[var(--dark2)] border border-[var(--border)] rounded-xl w-full max-w-md p-6 relative">
            <button onclick="closeSignupModal()" class="absolute top-4 left-4 text-gray-500 hover:text-red-400 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
            <h2 class="text-xl font-bold text-white mb-2">إنشاء حساب قائد</h2>
            <p class="text-xs text-gray-400 mb-6">الحساب هيحتاج موافقة الماستر قبل التفعيل</p>
            
            <form id="signupForm" onsubmit="handleSignup(event)" class="space-y-4">
                <div><label class="block text-xs font-bold text-[var(--gold)] mb-1">الاسم بالكامل *</label><input type="text" id="regName" class="form-input" required></div>
                <div><label class="block text-xs font-bold text-[var(--gold)] mb-1">رقم الموبايل *</label><input type="text" id="regPhone" class="form-input" required dir="ltr"></div>
                <div><label class="block text-xs font-bold text-[var(--gold)] mb-1">اسم المستخدم (Username) *</label><input type="text" id="regUser" class="form-input" required></div>
                
                <div class="relative">
                    <label class="block text-xs font-bold text-[var(--gold)] mb-1">كلمة المرور *</label>
                    <input type="password" id="regPass" class="form-input" required>
                    <button type="button" class="eye-icon-btn top-[28px]" onclick="togglePassword('regPass', 'regEye')">
                        <i id="regEye" class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
                
                <button type="submit" id="signupBtn" class="btn-gold w-full py-2 rounded-lg mt-4">تسجيل الحساب</button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbdprjxvtwfieiqncbez.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZHByanh2dHdmaWVpcW5jYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjI2NDgsImV4cCI6MjA5NTI5ODY0OH0.ptteVMU6OYawOqiQinKg2FQ_fpP-_VdG3BJY6alkgXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        if (localStorage.getItem('scout_leader_session')) window.location.href = 'home.html';

        // ================= دالة إظهار/إخفاء الباسوورد =================
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
        // ==============================================================

        async function handleLogin(event) {
            event.preventDefault();
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerHTML = 'جاري التحقق...';

            const { data, error } = await supabaseClient.from('leaders').select('*').eq('username', userInp).eq('password', passInp).single();

            if (error || !data) {
                alert('اسم المستخدم أو كلمة المرور غلط.');
            } else if (data.status === 'قيد الانتظار') {
                alert('حسابك لسه متفعلش يا قائد! استنى موافقة الماستر.');
            } else {
                localStorage.setItem('scout_leader_session', JSON.stringify({ full_name: data.full_name, username: data.username, role: data.role, troop: data.troop }));
                window.location.href = 'home.html';
            }
            btn.disabled = false; btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> تسجيل الدخول';
        }

        function openSignupModal() { document.getElementById('signupModal').classList.remove('hidden'); }
        function closeSignupModal() { document.getElementById('signupModal').classList.add('hidden'); }

        async function handleSignup(event) {
            event.preventDefault();
            const btn = document.getElementById('signupBtn');
            btn.disabled = true; btn.textContent = 'جاري التسجيل...';

            const leaderData = {
                full_name: document.getElementById('regName').value.trim(),
                phone: document.getElementById('regPhone').value.trim(),
                username: document.getElementById('regUser').value.trim(),
                password: document.getElementById('regPass').value.trim(),
                role: 'Viewer', // رتبة مؤقتة عشان الداتا بيز تقبل
                troop: 'غير محدد',
                status: 'قيد الانتظار' // ده اللي هيمنعه من الدخول لحد ما يتفعل
            };

            const { error } = await supabaseClient.from('leaders').insert([leaderData]);

            if (error) {
                if (error.code === '23505') alert('اسم المستخدم ده حد واخده، جرب واحد تاني!');
                else alert('خطأ: ' + error.message);
            } else {
                alert('تم تسجيل حسابك بنجاح! كلم الماستر عشان يفعلهولك ويحدد رتبتك.');
                closeSignupModal();
                document.getElementById('signupForm').reset();
            }
            btn.disabled = false; btn.textContent = 'تسجيل الحساب';
        }
    </script>
</body>
</html>
