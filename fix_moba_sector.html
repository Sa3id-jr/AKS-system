<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fix moba sector</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>جاري تصليح بيانات moba...</h1>
    <div id="result"></div>

    <script>
        const SUPABASE_URL = 'https://xbdprjxvtwfieiqncbez.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZHByanh2dHdmaWVpcW5jYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjI2NDgsImV4cCI6MjA5NTI5ODY0OH0.ptteVMU6OYawOqiQinKg2FQ_fpP-_VdG3BJY6alkgXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function fixMoba() {
            const resultDiv = document.getElementById('result');
            
            try {
                // Update moba's sector
                const { data, error } = await supabaseClient
                    .from('leaders')
                    .update({ sector: 'مبتدئ ومرشدات' })
                    .eq('username', 'moba')
                    .select();
                
                if (error) {
                    resultDiv.innerHTML = `<p style="color: red;">❌ خطأ: ${error.message}</p>`;
                    console.error('Error:', error);
                } else {
                    resultDiv.innerHTML = `<p style="color: green;">✅ تم تصليح بيانات moba بنجاح!</p>
                                          <pre>${JSON.stringify(data, null, 2)}</pre>
                                          <p><a href="home.html">ارجع للصفحة الرئيسية</a></p>`;
                    console.log('Success:', data);
                }
            } catch (err) {
                resultDiv.innerHTML = `<p style="color: red;">❌ خطأ: ${err.message}</p>`;
                console.error('Error:', err);
            }
        }

        fixMoba();
    </script>
</body>
</html>
