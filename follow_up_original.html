<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الافتقاد - Ava Kirolos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold:#c9a84c; --gold-lt:#e8d5a3; --silver:#c0c0c0; --dark:#0d0d0d; --dark2:#1a1a1a; --dark3:#242424; --border:rgba(201,168,76,0.25); }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:var(--dark); color:var(--silver); min-height:100vh; }
        nav  { background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%); border-bottom:1px solid var(--border); }
        .tabs-bar { background:var(--dark3); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; gap:4px; padding:8px; min-height:56px; align-items:flex-end; }
        .tab-btn  { color:#888; background:transparent; border:none; padding:10px 16px; border-radius:8px 8px 0 0; transition:all 0.2s; white-space:nowrap; cursor:pointer; font-size:0.82rem; font-weight:600; display:flex; align-items:center; gap:6px; }
        .tab-btn:hover  { color:var(--gold-lt); background:rgba(201,168,76,0.05); }
        .tab-btn.active { background:var(--dark2); color:var(--gold); border-bottom:3px solid var(--gold); }
        .content-card { background:var(--dark2); border:1px solid var(--border); border-radius:12px; padding:24px; margin-top:20px; }
        .scout-item { background:var(--dark3); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:10px; transition:all 0.2s; }
        .scout-item.contacted { background:rgba(16,185,129,0.06); border-color:rgba(16,185,129,0.35); }
        .form-input { width:100%; padding:0.6rem 0.75rem; border:1px solid rgba(201,168,76,0.2); border-radius:8px; background:var(--dark3); color:#fff; outline:none; font-size:0.9rem; }
        .form-input:focus { border-color:var(--gold); }
        .form-label { display:block; font-size:0.75rem; font-weight:700; color:var(--gold); margin-bottom:4px; }
        .btn-gold    { background:linear-gradient(135deg,var(--gold) 0%,#a8832a 100%); color:#0d0d0d; font-weight:700; transition:all 0.2s; border:none; cursor:pointer; }
        .btn-gold:hover { filter:brightness(1.15); }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--silver); transition:all 0.2s; cursor:pointer; }
        .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(4px); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
        .modal-box { background:var(--dark2); border:1px solid var(--border); border-radius:16px; width:100%; max-width:580px; max-height:92vh; overflow-y:auto; }
        .stat-badge     { display:inline-flex; align-items:center; gap:6px; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); color:var(--gold); font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:20px; }
        .assigned-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(100,149,237,0.12); border:1px solid rgba(100,149,237,0.35); color:#6495ed; font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:20px; }
    </style>
</head>
<body>
<nav class="p-4 sticky top-0 z-10 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <button onclick="window.location.href='home.html'" class="text-xl text-[var(--gold)] hover:text-white transition"><i class="fa-solid fa-house"></i></button>
        <button onclick="window.location.href='home.html'" class="text-xl text-gray-500 hover:text-[var(--gold)] transition ml-2"><i class="fa-solid fa-arrow-right"></i></button>
        <div>
            <h1 class="text-lg font-bold text-white">الافتقاد</h1>
            <p class="text-xs text-gray-500" id="sectorLabel">جاري التحميل...</p>
        </div>
    </div>
    <button onclick="openNewTaskModal()" class="btn-gold px-4 py-2 rounded-lg text-sm flex items-center gap-2" id="addTaskBtn">
        <i class="fa-solid fa-plus"></i> مهمة جديدة
    </button>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
    <div class="tabs-bar" id="tabsContainer">
        <div class="text-sm text-gray-500 py-2 w-full text-center"><i class="fa-solid fa-spinner fa-spin ml-2"></i>جاري التحميل...</div>
    </div>
    <div id="taskContent">
        <div class="content-card text-center text-gray-500 mt-6">
            <i class="fa-solid fa-clipboard-list text-5xl mb-3 opacity-30"></i>
            <p>اختر مهمة من الأعلى أو أنشئ مهمة جديدة</p>
        </div>
    </div>
</div>

<div id="newTaskModal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="flex justify-between items-center p-5 border-b border-[var(--border)]">
            <h3 class="font-bold text-white text-lg"><i class="fa-solid fa-plus ml-2 text-[var(--gold)]"></i>إنشاء مهمة افتقاد</h3>
            <button onclick="closeNewTaskModal()" class="text-gray-500 hover:text-red-400 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div class="p-5 space-y-4">
            <div>
                <label class="form-label">تاريخ المهمة *</label>
                <input type="date" id="newTaskDate" class="form-input">
            </div>
            <div>
                <label class="form-label">القائد المسؤول *</label>
                <select id="taskLeaderSelect" class="form-input" onchange="onLeaderSelected()">
                    <option value="">-- اختر قائد --</option>
                </select>
            </div>
            <div id="scoutsSelectionSection" style="display:none;">
                <div class="flex justify-between items-center mb-2">
                    <label class="form-label" style="margin-bottom:0;">اختر الكشافين *</label>
                    <div class="flex gap-3 text-xs">
                        <button type="button" onclick="selectAllScouts()" class="text-[var(--gold)] hover:underline">تحديد الكل</button>
                        <button type="button" onclick="deselectAllScouts()" class="text-gray-400 hover:text-white hover:underline">إلغاء الكل</button>
                    </div>
                </div>
                <div id="scoutsCheckList" class="border border-[rgba(201,168,76,0.2)] rounded-lg overflow-y-auto" style="max-height:220px;background:var(--dark3);"></div>
                <p class="text-xs text-gray-500 mt-1">تم تحديد <span id="selectedScoutsCount" class="text-[var(--gold)] font-bold">0</span> كشاف</p>
            </div>
            <div>
                <label class="form-label">ملاحظات (اختياري)</label>
                <textarea id="newTaskNotes" class="form-input" rows="2" placeholder="مثال: افتقاد أسبوعي"></textarea>
            </div>
            <div class="flex justify-end gap-2 pt-3 border-t border-[var(--border)]">
                <button onclick="closeNewTaskModal()" class="btn-outline px-4 py-2 rounded-lg text-sm">إلغاء</button>
                <button onclick="createNewTask()" id="createTaskBtn" class="btn-gold px-6 py-2 rounded-lg text-sm">إنشاء المهمة</button>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://gvyccfirjqnnvbznqjdk.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd2eWNjZmlyam';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let allTasks = [];
let currentTaskId = null;
let availableScouts = [];
let selectedLeaderTroop = '';

async function init() {
    const userData = localStorage.getItem('currentUser');
    if (!userData) { window.location.href = 'index.html'; return; }
    currentUser = JSON.parse(userData);
    
    document.getElementById('sectorLabel').textContent = currentUser.sector || 'غير محدد';
    
    if (currentUser.role === 'TroopLeader') {
        document.getElementById('addTaskBtn').style.display = 'none';
    }
    
    await loadTasks();
}

async function loadTasks() {
    try {
        let query = supabase.from('follow_up_tasks').select('*').order('task_date', { ascending: false });
        
        if (currentUser.role === 'SectorLeader') {
            query = query.eq('sector', currentUser.sector);
        } else if (currentUser.role === 'TroopLeader') {
            query = query.eq('assigned_to', currentUser.username);
        }
        
        const { data, error } = await query;
        if (error) throw error;
        
        allTasks = data || [];
        renderTabs();
    } catch (err) {
        console.error('Error loading tasks:', err);
        alert('حدث خطأ في تحميل المهام');
    }
}

function renderTabs() {
    const container = document.getElementById('tabsContainer');
    if (allTasks.length === 0) {
        container.innerHTML = '<div class="text-sm text-gray-500 py-2 w-full text-center">لا توجد مهام حتى الآن</div>';
        return;
    }
    
    container.innerHTML = allTasks.map((task, idx) => {
        const dateStr = new Date(task.task_date).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
        return `<button class="tab-btn ${idx === 0 ? 'active' : ''}" onclick="selectTask('${task.id}')">
            <i class="fa-solid fa-calendar-day"></i> ${dateStr}
        </button>`;
    }).join('');
    
    if (allTasks.length > 0) {
        selectTask(allTasks[0].id);
    }
}

async function selectTask(taskId) {
    currentTaskId = taskId;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.closest('.tab-btn').classList.add('active');
    
    await loadTaskDetails(taskId);
}

async function loadTaskDetails(taskId) {
    try {
        const { data: records, error } = await supabase
            .from('follow_up_records')
            .select('*')
            .eq('task_id', taskId);
        
        if (error) throw error;
        
        const task = allTasks.find(t => t.id === taskId);
        renderTaskContent(task, records || []);
    } catch (err) {
        console.error('Error loading task details:', err);
        alert('حدث خطأ في تحميل تفاصيل المهمة');
    }
}

function renderTaskContent(task, records) {
    const dateStr = new Date(task.task_date).toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
    const contactedCount = records.filter(r => r.contacted).length;
    
    const html = `
        <div class="content-card">
            <div class="flex justify-between items-start mb-5 pb-4 border-b border-[var(--border)]">
                <div>
                    <h2 class="text-xl font-bold text-white mb-2"><i class="fa-solid fa-clipboard-list ml-2 text-[var(--gold)]"></i>مهمة ${dateStr}</h2>
                    ${task.assigned_to_name ? `<div class="assigned-badge mb-2"><i class="fa-solid fa-user-tie"></i> ${task.assigned_to_name}</div>` : ''}
                    ${task.notes ? `<p class="text-sm text-gray-400 mt-2"><i class="fa-solid fa-note-sticky ml-1"></i>${task.notes}</p>` : ''}
                </div>
                <div class="stat-badge"><i class="fa-solid fa-check-circle"></i> ${contactedCount} / ${records.length}</div>
            </div>
            <div class="space-y-3">
                ${records.map(record => renderScoutItem(record)).join('')}
            </div>
        </div>
    `;
    
    document.getElementById('taskContent').innerHTML = html;
}

function renderScoutItem(record) {
    return `
        <div class="scout-item ${record.contacted ? 'contacted' : ''}">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-3">
                    <input type="checkbox" ${record.contacted ? 'checked' : ''} 
                           onchange="toggleContacted('${record.id}', this.checked)"
                           class="w-5 h-5 accent-[var(--gold)] cursor-pointer">
                    <div>
                        <div class="font-bold text-white">${record.scout_name}</div>
                        <div class="text-sm text-gray-400"><i class="fa-solid fa-phone ml-1"></i>${record.scout_phone || 'لا يوجد'}</div>
                    </div>
                </div>
                ${record.contacted ? '<span class="text-green-400 text-sm"><i class="fa-solid fa-circle-check ml-1"></i>تم الاتصال</span>' : ''}
            </div>
            <div>
                <textarea placeholder="ملاحظات الافتقاد..." 
                          class="form-input text-sm" rows="2"
                          onchange="updateComments('${record.id}', this.value)">${record.comments || ''}</textarea>
            </div>
        </div>
    `;
}

async function toggleContacted(recordId, contacted) {
    try {
        const { error } = await supabase
            .from('follow_up_records')
            .update({ 
                contacted: contacted,
                contacted_by: contacted ? currentUser.full_name : null
            })
            .eq('id', recordId);
        
        if (error) throw error;
        await loadTaskDetails(currentTaskId);
    } catch (err) {
        console.error('Error updating contacted status:', err);
        alert('حدث خطأ في التحديث');
    }
}

async function updateComments(recordId, comments) {
    try {
        const { error } = await supabase
            .from('follow_up_records')
            .update({ comments: comments })
            .eq('id', recordId);
        
        if (error) throw error;
    } catch (err) {
        console.error('Error updating comments:', err);
    }
}

function openNewTaskModal() {
    document.getElementById('newTaskModal').classList.remove('hidden');
    document.getElementById('newTaskDate').value = new Date().toISOString().split('T')[0];
    loadLeadersForTask();
}

function closeNewTaskModal() {
    document.getElementById('newTaskModal').classList.add('hidden');
    document.getElementById('taskLeaderSelect').value = '';
    document.getElementById('scoutsSelectionSection').style.display = 'none';
    document.getElementById('scoutsCheckList').innerHTML = '';
    document.getElementById('newTaskNotes').value = '';
}

async function loadLeadersForTask() {
    try {
        const { data, error } = await supabase
            .from('leaders')
            .select('*')
            .eq('sector', currentUser.sector)
            .eq('role', 'TroopLeader');
        
        if (error) throw error;
        
        const select = document.getElementById('taskLeaderSelect');
        select.innerHTML = '<option value="">-- اختر قائد --</option>' + 
            (data || []).map(leader => 
                `<option value="${leader.username}" data-troop="${leader.troop}">${leader.full_name} (${leader.troop})</option>`
            ).join('');
    } catch (err) {
        console.error('Error loading leaders:', err);
        alert('حدث خطأ في تحميل القادة');
    }
}

async function onLeaderSelected() {
    const select = document.getElementById('taskLeaderSelect');
    const selectedOption = select.options[select.selectedIndex];
    
    if (!select.value) {
        document.getElementById('scoutsSelectionSection').style.display = 'none';
        return;
    }
    
    selectedLeaderTroop = selectedOption.getAttribute('data-troop');
    await loadScoutsForTroop(selectedLeaderTroop);
    document.getElementById('scoutsSelectionSection').style.display = 'block';
}

async function loadScoutsForTroop(troop) {
    try {
        const stageMap = {
            'أشبال وزهرات': 'ابتدائي',
            'مبتدئ ومرشدات': 'اعدادي',
            'متقدم ورائدات': 'ثانوي'
        };
        const stage = stageMap[troop] || troop;
        
        const { data, error } = await supabase
            .from('scouts')
            .select('scout_id, full_name, personal_phone, father_phone, mother_phone')
            .eq('school_stage', stage)
            .eq('status', 'مقبول');
        
        if (error) throw error;
        
        availableScouts = data || [];
        renderScoutsCheckList();
    } catch (err) {
        console.error('Error loading scouts:', err);
        alert('حدث خطأ في تحميل الكشافين');
    }
}

function renderScoutsCheckList() {
    const container = document.getElementById('scoutsCheckList');
    if (availableScouts.length === 0) {
        container.innerHTML = '<div class="p-4 text-center text-gray-500 text-sm">لا يوجد كشافين في هذه الفرقة</div>';
        return;
    }
    
    container.innerHTML = availableScouts.map(scout => `
        <label class="flex items-center gap-3 p-3 hover:bg-[rgba(201,168,76,0.05)] cursor-pointer border-b border-[rgba(201,168,76,0.1)] last:border-0">
            <input type="checkbox" value="${scout.scout_id}" onchange="updateSelectedCount()" 
                   class="w-4 h-4 accent-[var(--gold)] cursor-pointer scout-checkbox">
            <div class="flex-1">
                <div class="text-white text-sm font-semibold">${scout.full_name}</div>
                <div class="text-xs text-gray-400">${scout.personal_phone || scout.father_phone || scout.mother_phone || 'لا يوجد رقم'}</div>
            </div>
        </label>
    `).join('');
    
    updateSelectedCount();
}

function updateSelectedCount() {
    const checked = document.querySelectorAll('.scout-checkbox:checked').length;
    document.getElementById('selectedScoutsCount').textContent = checked;
}

function selectAllScouts() {
    document.querySelectorAll('.scout-checkbox').forEach(cb => cb.checked = true);
    updateSelectedCount();
}

function deselectAllScouts() {
    document.querySelectorAll('.scout-checkbox').forEach(cb => cb.checked = false);
    updateSelectedCount();
}

async function createNewTask() {
    const taskDate = document.getElementById('newTaskDate').value;
    const leaderUsername = document.getElementById('taskLeaderSelect').value;
    const leaderName = document.getElementById('taskLeaderSelect').options[document.getElementById('taskLeaderSelect').selectedIndex].text.split(' (')[0];
    const notes = document.getElementById('newTaskNotes').value;
    const selectedScouts = Array.from(document.querySelectorAll('.scout-checkbox:checked')).map(cb => cb.value);
    
    if (!taskDate || !leaderUsername || selectedScouts.length === 0) {
        alert('يرجى ملء جميع الحقول المطلوبة واختيار كشاف واحد على الأقل');
        return;
    }
    
    try {
        const { data: taskData, error: taskError } = await supabase
            .from('follow_up_tasks')
            .insert({
                task_date: taskDate,
                assigned_to: leaderUsername,
                assigned_to_name: leaderName,
                sector: currentUser.sector,
                notes: notes
            })
            .select()
            .single();
        
        if (taskError) throw taskError;
        
        const records = selectedScouts.map(scoutId => {
            const scout = availableScouts.find(s => s.scout_id === scoutId);
            return {
                task_id: taskData.id,
                scout_id: scoutId,
                scout_name: scout.full_name,
                scout_phone: scout.personal_phone || scout.father_phone || scout.mother_phone,
                contacted: false,
                comments: ''
            };
        });
        
        const { error: recordsError } = await supabase
            .from('follow_up_records')
            .insert(records);
        
        if (recordsError) throw recordsError;
        
        alert('تم إنشاء المهمة بنجاح');
        closeNewTaskModal();
        await loadTasks();
    } catch (err) {
        console.error('Error creating task:', err);
        alert('حدث خطأ في إنشاء المهمة');
    }
}

init();
</script>
</body>
</html>
