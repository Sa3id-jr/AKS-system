<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأسيس طليعة - Ava Kirolos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --gold:    #c9a84c;
            --gold-lt: #e8d5a3;
            --silver:  #c0c0c0;
            --dark:    #0d0d0d;
            --dark2:   #1a1a1a;
            --dark3:   #242424;
            --border:  rgba(201,168,76,0.25);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark); color: var(--silver); min-height: 100vh; }

        nav { background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%); border-bottom: 1px solid var(--border); }

        .form-input {
            width: 100%; padding: 0.75rem 1rem;
            border: 1px solid rgba(201,168,76,0.2);
            border-radius: 10px;
            background: var(--dark3); color: #fff;
            outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            font-size: 0.95rem;
        }
        .form-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.12); }
        .form-input::placeholder { color: #444; }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--gold); margin-bottom: 8px; }

        /* ===== Scout Cards ===== */
        .scout-card {
            background: var(--dark3);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
            user-select: none;
        }
        .scout-card:hover { border-color: rgba(201,168,76,0.3); background: rgba(201,168,76,0.04); }
        .scout-card.selected {
            border-color: var(--gold);
            background: rgba(201,168,76,0.1);
            box-shadow: 0 0 0 1px rgba(201,168,76,0.3);
        }
        .scout-card .check-icon {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid #444;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0; transition: all 0.2s;
            font-size: 0.65rem; color: transparent;
        }
        .scout-card.selected .check-icon {
            background: var(--gold); border-color: var(--gold); color: #000;
        }
        .avatar-initials {
            width: 38px; height: 38px; border-radius: 50%;
            background: rgba(201,168,76,0.12);
            border: 1px solid rgba(201,168,76,0.25);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; color: var(--gold);
            flex-shrink: 0;
        }

        /* ===== Selected Counter ===== */
        .selected-bar {
            position: sticky; bottom: 0;
            background: linear-gradient(to top, var(--dark) 80%, transparent);
            padding: 16px 0 24px;
            margin-top: 16px;
        }

        .btn-gold {
            background: linear-gradient(135deg, var(--gold) 0%, #a8832a 100%);
            color: #0d0d0d; font-weight: 700;
            border: none; cursor: pointer;
            transition: all 0.2s;
        }
        .btn-gold:hover { filter: brightness(1.12); transform: translateY(-1px); }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .section-card {
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
        }

        .search-input-wrap { position: relative; }
        .search-input-wrap input { padding-right: 2.5rem; }
        .search-input-wrap i { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #555; }

        /* ===== Skeleton ===== */
        .skeleton { background: linear-gradient(90deg, var(--dark2) 25%, var(--dark3) 50%, var(--dark2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: 8px; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body>

    <nav class="p-4 sticky top-0 z-10 flex items-center gap-3">
        <button onclick="window.location.href='patrols.html'" class="text-xl text-[var(--gold)] hover:text-white transition ml-2">
            <i class="fa-solid fa-arrow-right"></i>
        </button>
        <div>
            <h1 class="text-lg font-bold text-white" id="pageTitle">تأسيس طليعة جديدة</h1>
            <p class="text-xs text-gray-500">اختار الكشافين وأضفهم للطليعة</p>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-6 space-y-6">

        <!-- بيانات الطليعة -->
        <div class="section-card">
            <p class="text-xs font-bold text-[var(--gold)] mb-4 flex items-center gap-2">
                <i class="fa-solid fa-shield-halved"></i> بيانات الطليعة
            </p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="form-label">اسم الطليعة *</label>
                    <input type="text" id="patrolName" class="form-input" placeholder="مثال: طليعة النسور">
                </div>
                <div>
                    <label class="form-label">صيحة الطليعة</label>
                    <input type="text" id="patrolYell" class="form-input" placeholder="الصيحة الخاصة بالطليعة">
                </div>
            </div>
        </div>

        <!-- اختار الكشافين -->
        <div class="section-card">
            <div class="flex justify-between items-center mb-4">
                <p class="text-xs font-bold text-[var(--gold)] flex items-center gap-2">
                    <i class="fa-solid fa-users"></i> اختار أعضاء الطليعة
                </p>
                <span id="selectedCount" class="text-xs font-bold px-3 py-1 rounded-full bg-[rgba(201,168,76,0.1)] text-[var(--gold)] border border-[rgba(201,168,76,0.3)]">
                    0 محدد
                </span>
            </div>

            <div class="search-input-wrap mb-4">
                <input type="text" id="searchScout" class="form-input" placeholder="ابحث عن كشاف بالاسم..." oninput="filterScouts()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>

            <div id="scoutsList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[420px] overflow-y-auto pl-1">
                <!-- Skeleton -->
                <div class="scout-card"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-3/4 mb-2"></div><div class="skeleton h-2 w-1/2"></div></div></div>
                <div class="scout-card"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-3/4 mb-2"></div><div class="skeleton h-2 w-1/2"></div></div></div>
                <div class="scout-card"><div class="skeleton w-10 h-10 rounded-full"></div><div class="flex-1"><div class="skeleton h-3 w-3/4 mb-2"></div><div class="skeleton h-2 w-1/2"></div></div></div>
            </div>
        </div>

        <!-- زرار الحفظ -->
        <div class="selected-bar">
            <button id="saveBtn" onclick="savePatrol()" disabled class="btn-gold w-full py-4 rounded-xl text-base flex items-center justify-center gap-2">
                <i class="fa-solid fa-shield-halved"></i>
                <span id="saveBtnText">حفظ الطليعة</span>
            </button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbdprjxvtwfieiqncbez.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZHByanh2dHdmaWVpcW5jYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjI2NDgsImV4cCI6MjA5NTI5ODY0OH0.ptteVMU6OYawOqiQinKg2FQ_fpP-_VdG3BJY6alkgXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const sessionData = localStorage.getItem('scout_leader_session');
        if (!sessionData) window.location.href = 'index.html';
        const currentUser = JSON.parse(sessionData);

        // هل ده edit mode؟
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('edit');
        if (editId) {
            document.getElementById('pageTitle').textContent = 'تعديل الطليعة';
        }

        let allScouts = [];
        let selectedIds = new Set();

        // ===== تحميل الكشافين =====
        async function loadScouts() {
            let query = supabaseClient
                .from('scouts')
                .select('scout_id, full_name, school_stage, gender')
                .eq('status', 'مقبول')
                .order('full_name');

            // فلترة حسب الفرقة لو مش ماستر
            if (currentUser.role !== 'Master' && currentUser.role !== 'General') {
                const stageMap = {
                    'أشبال': 'ابتدائي', 'زهرات': 'ابتدائي',
                    'كشاف مبتدئ': 'اعدادي', 'مرشدات': 'اعدادي',
                    'كشاف متقدم': 'ثانوي', 'رائدات': 'ثانوي',
                    'براعم': 'براعم'
                };
                const stage = stageMap[currentUser.troop];
                if (stage) query = query.eq('school_stage', stage);
            }

            // لو edit، جيب الأعضاء الحاليين برضو + الكشافين اللي معندهمش طليعة
            if (editId) {
                query = query.or(`patrol_id.is.null,patrol_id.eq.${editId}`);
            } else {
                query = query.is('patrol_id', null);
            }

            const { data, error } = await query;

            if (error) {
                document.getElementById('scoutsList').innerHTML = `<p class="text-red-400 text-sm col-span-2">خطأ: ${error.message}</p>`;
                return;
            }

            allScouts = data || [];

            // لو edit، محدد الأعضاء الحاليين
            if (editId) {
                const { data: patrol } = await supabaseClient.from('patrols').select('name, yell').eq('id', editId).single();
                if (patrol) {
                    document.getElementById('patrolName').value = patrol.name;
                    document.getElementById('patrolYell').value = patrol.yell || '';
                }
                const { data: members } = await supabaseClient.from('scouts').select('scout_id').eq('patrol_id', editId);
                if (members) members.forEach(m => selectedIds.add(m.scout_id));
            }

            renderScouts(allScouts);
        }

        function renderScouts(scouts) {
            const list = document.getElementById('scoutsList');

            if (scouts.length === 0) {
                list.innerHTML = `<div class="col-span-2 text-center text-gray-500 py-8 text-sm"><i class="fa-solid fa-user-slash block text-2xl mb-2"></i>مفيش كشافين متاحين</div>`;
                return;
            }

            list.innerHTML = '';
            scouts.forEach(s => {
                const isSelected = selectedIds.has(s.scout_id);
                const initials = s.full_name.trim().split(' ').map(w => w[0]).slice(0, 2).join('');
                const div = document.createElement('div');
                div.className = `scout-card ${isSelected ? 'selected' : ''}`;
                div.dataset.id = s.scout_id;
                div.innerHTML = `
                    <div class="check-icon"><i class="fa-solid fa-check"></i></div>
                    <div class="avatar-initials">${initials}</div>
                    <div class="flex-1 min-w-0">
                        <p class="text-white text-sm font-medium truncate">${s.full_name}</p>
                        <p class="text-gray-500 text-xs">${s.school_stage || ''} · ${s.gender || ''}</p>
                    </div>
                `;
                div.onclick = () => toggleScout(div, s.scout_id);
                list.appendChild(div);
            });

            updateCounter();
        }

        function toggleScout(el, id) {
            if (selectedIds.has(id)) {
                selectedIds.delete(id);
                el.classList.remove('selected');
            } else {
                selectedIds.add(id);
                el.classList.add('selected');
            }
            updateCounter();
        }

        function updateCounter() {
            const count = selectedIds.size;
            document.getElementById('selectedCount').textContent = `${count} محدد`;
            const btn = document.getElementById('saveBtn');
            btn.disabled = count === 0 && !document.getElementById('patrolName').value.trim();
            btn.disabled = false; // نفعّل الزرار دايما عشان يقدر يحفظ بدون أعضاء لو عايز
        }

        function filterScouts() {
            const term = document.getElementById('searchScout').value.toLowerCase().trim();
            const filtered = term ? allScouts.filter(s => s.full_name.toLowerCase().includes(term)) : allScouts;
            renderScouts(filtered);
        }

        // ===== حفظ الطليعة =====
        async function savePatrol() {
            const name = document.getElementById('patrolName').value.trim();
            const yell = document.getElementById('patrolYell').value.trim();

            if (!name) {
                document.getElementById('patrolName').focus();
                document.getElementById('patrolName').style.borderColor = '#e53e3e';
                setTimeout(() => document.getElementById('patrolName').style.borderColor = '', 2000);
                return;
            }

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;
            document.getElementById('saveBtnText').textContent = 'جاري الحفظ...';

            try {
                let patrolId = editId;

                if (editId) {
                    // تعديل
                    const { error } = await supabaseClient.from('patrols').update({ name, yell }).eq('id', editId);
                    if (error) throw error;
                    // فك الكشافين القدام
                    await supabaseClient.from('scouts').update({ patrol_id: null }).eq('patrol_id', editId);
                } else {
                    // إضافة جديدة
                    const { data, error } = await supabaseClient
                        .from('patrols')
                        .insert([{ name, yell, troop: currentUser.troop }])
                        .select();
                    if (error) throw error;
                    patrolId = data[0].id;
                }

                // إضافة الكشافين الجدد
                if (selectedIds.size > 0) {
                    const { error } = await supabaseClient
                        .from('scouts')
                        .update({ patrol_id: patrolId })
                        .in('scout_id', Array.from(selectedIds));
                    if (error) throw error;
                }

                alert(editId ? 'تم تعديل الطليعة بنجاح!' : 'تم تأسيس الطليعة بنجاح!');
                window.location.href = 'patrols.html';

            } catch (err) {
                alert('خطأ: ' + err.message);
                btn.disabled = false;
                document.getElementById('saveBtnText').textContent = 'حفظ الطليعة';
            }
        }

        loadScouts();
    </script>
</body>
</html>
