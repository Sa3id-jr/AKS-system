<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="icon" type="image/png" href="https://xbdprjxvtwfieiqncbez.supabase.co/storage/v1/object/public/Logo/Gemini_Generated_Image_.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأسيس طليعة - Ava Kirolos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold: #c9a84c; --gold-lt: #e8d5a3; --silver: #c0c0c0; --dark: #0d0d0d; --dark2: #1a1a1a; --dark3: #242424; --border: rgba(201,168,76,0.25); }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark); color: var(--silver); min-height: 100vh; }
        nav { background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%); border-bottom: 1px solid var(--border); }
        .form-input { width: 100%; padding: 0.75rem 1rem; border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; background: var(--dark3); color: #fff; outline: none; }
        .form-input:focus { border-color: var(--gold); }
        .form-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--gold); margin-bottom: 8px; }
        .scout-card { background: var(--dark3); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .scout-card.selected { border-color: var(--gold); background: rgba(201,168,76,0.1); }
        .check-icon { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: transparent; }
        .scout-card.selected .check-icon { background: var(--gold); border-color: var(--gold); color: #000; }
        .avatar-initials { width: 38px; height: 38px; border-radius: 50%; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.25); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--gold); }
        .section-card { background: var(--dark2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; }
        .btn-gold { background: linear-gradient(135deg, var(--gold) 0%, #a8832a 100%); color: #0d0d0d; font-weight: 700; border: none; cursor: pointer; }
        .btn-gold:disabled { opacity: 0.5; cursor: not-allowed; }
        .request-banner { background: rgba(60,179,113,0.1); border: 1px solid rgba(60,179,113,0.3); border-radius: 10px; padding: 12px 16px; color: #3cb371; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
    </style>
</head>
<body>
    <nav class="p-4 sticky top-0 z-10 flex items-center gap-3">
        <button onclick="window.location.href='home.html'" class="text-xl text-[var(--gold)] hover:text-white transition" title="الرئيسية"><i class="fa-solid fa-house"></i></button>
        <button onclick="window.location.href='patrols.html'" class="text-xl text-gray-500 hover:text-[var(--gold)] transition ml-2" title="رجوع للطلايع"><i class="fa-solid fa-arrow-right"></i></button>
        <div>
            <h1 class="text-lg font-bold text-white" id="pageTitle">تأسيس طليعة جديدة</h1>
            <p class="text-xs text-gray-500" id="pageSubtitle">اختار الكشافين وأضفهم للطليعة</p>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-6 space-y-6">
        <div id="requestBanner" class="request-banner hidden">
            <i class="fa-solid fa-circle-info"></i><span>كقائد فرقة، طلبك (إنشاء أو تعديل) يُرسل لقائد القطاع والماستر/القائد العام للموافقة.</span>
        </div>

        <div class="section-card">
            <p class="text-xs font-bold text-[var(--gold)] mb-4 flex items-center gap-2"><i class="fa-solid fa-shield-halved"></i> بيانات الطليعة</p>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div><label class="form-label">اسم الطليعة *</label><input type="text" id="patrolName" class="form-input" placeholder="مثال: طليعة النسور"></div>
                <div><label class="form-label">صيحة الطليعة</label><input type="text" id="patrolYell" class="form-input" placeholder="الصيحة"></div>
                
                <div id="troopSelectorContainer" class="hidden col-span-1 sm:col-span-2">
                    <label class="form-label">الفرقة الخاصة للطليعة المدمجة *</label>
                    <select id="patrolTroop" class="form-input" onchange="loadScouts()"></select>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="flex justify-between items-center mb-4">
                <p class="text-xs font-bold text-[var(--gold)]"><i class="fa-solid fa-users"></i> اختار أعضاء الطليعة (ميكس)</p>
                <span id="selectedCount" class="text-xs font-bold px-3 py-1 rounded-full bg-[rgba(201,168,76,0.1)] text-[var(--gold)] border border-[rgba(201,168,76,0.3)]">0 محدد</span>
            </div>
            <input type="text" id="searchScout" class="form-input mb-4" placeholder="ابحث عن كشاف بالاسم..." oninput="filterScouts()">
            <div id="scoutsList" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[420px] overflow-y-auto pl-1"></div>
        </div>

        <button id="saveBtn" onclick="savePatrol()" class="btn-gold w-full py-4 rounded-xl text-base flex justify-center gap-2 mb-6">
            <i class="fa-solid fa-shield-halved"></i><span id="saveBtnText">حفظ الطليعة</span>
        </button>
    </div>

    <script>
        const SUPABASE_URL = 'https://xbdprjxvtwfieiqncbez.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZHByanh2dHdmaWVpcW5jYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjI2NDgsImV4cCI6MjA5NTI5ODY0OH0.ptteVMU6OYawOqiQinKg2FQ_fpP-_VdG3BJY6alkgXM';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const currentUser = JSON.parse(localStorage.getItem('scout_leader_session') || 'null');
        if (!currentUser) window.location.href = 'index.html';
        if (currentUser.role === 'Viewer') {
            alert('ليس لديك صلاحية تعديل أو إضافة طلايع.');
            window.location.href = 'patrols.html';
        }

        const isTroopLeader = currentUser.role === 'TroopLeader';
        const editId = new URLSearchParams(window.location.search).get('edit');

        if (editId) {
            document.getElementById('pageTitle').textContent = 'تعديل الطليعة';
            document.getElementById('pageSubtitle').textContent = 'عدّل الاسم والصيحة وأعضاء الطليعة';
        }

        if (isTroopLeader) {
            document.getElementById('requestBanner').classList.remove('hidden');
            document.getElementById('saveBtnText').textContent = editId ? 'إرسال طلب تعديل' : 'إرسال طلب للموافقة';
        } else if (editId) {
            document.getElementById('saveBtnText').textContent = 'حفظ التعديلات';
        }

        let allScouts = []; let selectedIds = new Set();
        
        // خريطة المسميات الكشفية للمرحلة الدراسية في الداتابيز (لجلب الولاد والبنات مع بعض)
        const stageMap = {
            'براعم': 'براعم',
            'أشبال وزهرات': 'ابتدائي',
            'مبتدئ ومرشدات': 'اعدادي',
            'متقدم ورائدات': 'ثانوي'
        };
        const sectorToTroopsMap = {
            'براعم': ['براعم'],
            'ابتدائي': ['أشبال وزهرات'],
            'اعدادي': ['مبتدئ ومرشدات'],
            'ثانوي': ['متقدم ورائدات']
        };

        function normalizeTroopName(troop) {
            const map = {
                'أشبال': 'أشبال وزهرات',
                'زهرات': 'أشبال وزهرات',
                'كشاف مبتدئ': 'مبتدئ ومرشدات',
                'مرشدات': 'مبتدئ ومرشدات',
                'كشاف متقدم': 'متقدم ورائدات',
                'رائدات': 'متقدم ورائدات'
            };
            return map[(troop || '').trim()] || troop;
        }

        function normalizeSectorName(sector) {
            const raw = (sector || '').trim();
            if (raw.startsWith('قطاع ')) return raw.replace('قطاع ', '').trim();
            return raw;
        }

        function getDbSchoolStage(troopOrSector) {
            if (!troopOrSector) return null;
            const unified = normalizeTroopName(String(troopOrSector).trim());
            const map = {
                'براعم': 'براعم', 'أشبال وزهرات': 'ابتدائي', 'مبتدئ ومرشدات': 'اعدادي', 'متقدم ورائدات': 'ثانوي',
                'ابتدائي': 'ابتدائي', 'اعدادي': 'اعدادي', 'ثانوي': 'ثانوي'
            };
            return map[unified] || map[String(troopOrSector).trim()] || null;
        }

        function getSectorMainTroop(sector) {
            const key = normalizeSectorName(sector);
            const troops = sectorToTroopsMap[key] || [];
            return troops[0] || null;
        }

        if (['SectorLeader', 'Master', 'General'].includes(currentUser.role)) {
            const container = document.getElementById('troopSelectorContainer');
            const select = document.getElementById('patrolTroop');
            container.classList.remove('hidden');
            
            if (currentUser.role === 'SectorLeader') {
                const sectorTroop = getSectorMainTroop(currentUser.sector) || 'أشبال وزهرات';
                select.innerHTML = `<option value="${sectorTroop}">${sectorTroop}</option>`;
            } else {
                select.innerHTML = `
                    <option value="براعم">براعم</option>
                    <option value="أشبال وزهرات">أشبال وزهرات</option>
                    <option value="مبتدئ ومرشدات">مبتدئ ومرشدات</option>
                    <option value="متقدم ورائدات">متقدم ورائدات</option>
                `;
            }
        }

        async function loadScouts() {
            let query = supabaseClient.from('scouts').select('scout_id, full_name, school_stage, gender').eq('status', 'مقبول').order('full_name');

            let targetGroup = currentUser.role === 'TroopLeader'
                ? currentUser.troop
                : (currentUser.role === 'SectorLeader'
                    ? getSectorMainTroop(currentUser.sector)
                    : (document.getElementById('patrolTroop')?.value || 'أشبال وزهرات'));
            targetGroup = normalizeTroopName(targetGroup || '');

            // لو في تعديل طليعة قديمة، نجيب القطاع بتاعها
            if (editId && ['Master', 'General'].includes(currentUser.role)) {
                const { data: patrol } = await supabaseClient.from('patrols').select('troop').eq('id', editId).single();
                if (patrol && patrol.troop) {
                    targetGroup = patrol.troop;
                    if(document.getElementById('patrolTroop')) document.getElementById('patrolTroop').value = targetGroup;
                }
            }

            const dbStage = stageMap[targetGroup] || getDbSchoolStage(targetGroup);
            if (dbStage) {
                query = query.eq('school_stage', dbStage);
            }

            if (editId) query = query.or(`patrol_id.is.null,patrol_id.eq.${editId}`);
            else query = query.is('patrol_id', null);

            const { data, error } = await query;
            if (error) return;
            allScouts = data || [];

            if (editId && selectedIds.size === 0) {
                const { data: patrol } = await supabaseClient.from('patrols').select('name, yell, troop').eq('id', editId).single();
                if (patrol) { 
                    document.getElementById('patrolName').value = patrol.name; 
                    document.getElementById('patrolYell').value = patrol.yell || '';
                }
                const { data: members } = await supabaseClient.from('scouts').select('scout_id').eq('patrol_id', editId);
                if (members) members.forEach(m => selectedIds.add(m.scout_id));
                document.getElementById('selectedCount').textContent = `${selectedIds.size} محدد`;
            }
            renderScouts(allScouts);
        }

        function renderScouts(scouts) {
            const list = document.getElementById('scoutsList');
            list.innerHTML = '';
            scouts.forEach(s => {
                const isSelected = selectedIds.has(s.scout_id);
                const div = document.createElement('div');
                div.className = `scout-card ${isSelected ? 'selected' : ''}`;
                div.innerHTML = `<div class="check-icon"><i class="fa-solid fa-check"></i></div><div class="avatar-initials">${s.full_name[0]}</div><div class="flex-1 min-w-0"><p class="text-white text-sm font-medium truncate">${s.full_name}</p><p class="text-gray-500 text-xs">${s.school_stage || ''} · ${s.gender || ''}</p></div>`;
                div.onclick = () => {
                    isSelected ? selectedIds.delete(s.scout_id) : selectedIds.add(s.scout_id);
                    document.getElementById('selectedCount').textContent = `${selectedIds.size} محدد`;
                    renderScouts(scouts); 
                };
                list.appendChild(div);
            });
        }

        function filterScouts() {
            const term = document.getElementById('searchScout').value.toLowerCase().trim();
            renderScouts(term ? allScouts.filter(s => s.full_name.toLowerCase().includes(term)) : allScouts);
        }

        async function savePatrol() {
            const name = document.getElementById('patrolName').value.trim();
            const yell = document.getElementById('patrolYell').value.trim();
            if (!name) return alert("اسم الطليعة مطلوب");

            const btn = document.getElementById('saveBtn');
            btn.disabled = true;

            let targetTroop = currentUser.troop;
            if (['SectorLeader', 'Master', 'General'].includes(currentUser.role)) {
                targetTroop = document.getElementById('patrolTroop').value;
            }
            targetTroop = normalizeTroopName(targetTroop);
            if (!targetTroop) {
                btn.disabled = false;
                return alert('تعذر تحديد الفرقة المستهدفة للطليعة.');
            }

            try {
                if (isTroopLeader) {
                    // ⏳ قائد الفرقة يرسل طلب معلق
                    const reqData = { type: editId ? 'edit' : 'create', patrol_id: editId || null, patrol_name: name, patrol_yell: yell, scout_ids: Array.from(selectedIds), requested_by: currentUser.username, troop: targetTroop, status: 'pending' };
                    const { error: reqError } = await supabaseClient.from('patrol_requests').insert([reqData]);
                    if (reqError) throw reqError;
                    alert('تم إرسال الطلب لقائد القطاع للمراجعة، والماستر/القائد العام يقدروا يراجعوه أيضًا.');
                } else {
                    // ✅ SectorLeader/Master/General يضيفون الطليعة مباشرة
                    let patrolId = editId;
                    if (editId) {
                        const { error: updateError } = await supabaseClient.from('patrols').update({ name, yell, troop: targetTroop }).eq('id', editId);
                        if (updateError) throw updateError;
                        const { error: clearError } = await supabaseClient.from('scouts').update({ patrol_id: null }).eq('patrol_id', editId);
                        if (clearError) throw clearError;
                    } else {
                        const { data, error: insertError } = await supabaseClient.from('patrols').insert([{ name, yell, troop: targetTroop }]).select();
                        if (insertError) throw insertError;
                        patrolId = data[0].id;
                    }
                    if (selectedIds.size > 0) {
                        const { error: assignError } = await supabaseClient.from('scouts').update({ patrol_id: patrolId }).in('scout_id', Array.from(selectedIds));
                        if (assignError) throw assignError;
                    }
                    alert(editId ? 'تم التعديل بنجاح!' : 'تم تأسيس الطليعة بنجاح بدون موافقة!');
                }
                window.location.href = 'patrols.html';
            } catch (err) { 
                alert(err.message); 
                btn.disabled = false; 
            }
        }

        // أضفنا استدعاء الدالة هنا عشان تشتغل أول ما الصفحة تفتح
        loadScouts();
    </script>
</body>
</html>
