<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الافتقاد - Ava Kirolos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --gold:#c9a84c; --gold-lt:#e8d5a3; --silver:#c0c0c0; --dark:#0d0d0d; --dark2:#1a1a1a; --dark3:#242424; --border:rgba(201,168,76,0.25); }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:var(--dark); color:var(--silver); min-height:100vh; }
        nav  { background:linear-gradient(135deg,var(--dark) 0%,var(--dark2) 100%); border-bottom:1px solid var(--border); }
        .tabs-bar { background:var(--dark3); border-bottom:1px solid var(--border); display:flex; overflow-x:auto; gap:4px; padding:8px; min-height:56px; align-items:flex-end; }
        .tab-btn  { color:#888; background:transparent; border:none; padding:10px 16px; border-radius:8px 8px 0 0; transition:all 0.2s; white-space:nowrap; cursor:pointer; font-size:0.82rem; font-weight:600; display:flex; align-items:center; gap:6px; }
        .tab-btn:hover  { color:var(--gold-lt); background:rgba(201,168,76,0.05); }
        .tab-btn.active { background:var(--dark2); color:var(--gold); border-bottom:3px solid var(--gold); }
        .content-card { background:var(--dark2); border:1px solid var(--border); border-radius:12px; padding:24px; margin-top:20px; }
        .scout-item { background:var(--dark3); border:1px solid var(--border); border-radius:10px; padding:16px; margin-bottom:10px; transition:all 0.2s; }
        .scout-item.contacted { background:rgba(16,185,129,0.06); border-color:rgba(16,185,129,0.35); }
        .form-input { width:100%; padding:0.6rem 0.75rem; border:1px solid rgba(201,168,76,0.2); border-radius:8px; background:var(--dark3); color:#fff; outline:none; font-size:0.9rem; }
        .form-input:focus { border-color:var(--gold); }
        .form-label { display:block; font-size:0.75rem; font-weight:700; color:var(--gold); margin-bottom:4px; }
        .btn-gold    { background:linear-gradient(135deg,var(--gold) 0%,#a8832a 100%); color:#0d0d0d; font-weight:700; transition:all 0.2s; border:none; cursor:pointer; }
        .btn-gold:hover { filter:brightness(1.15); }
        .btn-outline { background:transparent; border:1px solid var(--border); color:var(--silver); transition:all 0.2s; cursor:pointer; }
        .btn-outline:hover { border-color:var(--gold); color:var(--gold); }
        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(4px); z-index:50; display:flex; align-items:center; justify-content:center; padding:20px; }
        .modal-box { background:var(--dark2); border:1px solid var(--border); border-radius:16px; width:100%; max-width:580px; max-height:92vh; overflow-y:auto; }
        .stat-badge     { display:inline-flex; align-items:center; gap:6px; background:rgba(201,168,76,0.1); border:1px solid rgba(201,168,76,0.3); color:var(--gold); font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:20px; }
        .assigned-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(100,149,237,0.12); border:1px solid rgba(100,149,237,0.35); color:#6495ed; font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:20px; }
    </style>
</head>
<body>
<nav class="p-4 sticky top-0 z-10 flex justify-between items-center">
    <div class="flex items-center gap-3">
        <button onclick="window.location.href='home.html'" class="text-xl text-[var(--gold)] hover:text-white transition"><i class="fa-solid fa-house"></i></button>
        <button onclick="window.location.href='home.html'" class="text-xl text-gray-500 hover:text-[var(--gold)] transition ml-2"><i class="fa-solid fa-arrow-right"></i></button>
        <div>
            <h1 class="text-lg font-bold text-white">الافتقاد</h1>
            <p class="text-xs text-gray-500" id="sectorLabel">جاري التحميل...</p>
        </div>
    </div>
    <button onclick="openNewTaskModal()" class="btn-gold px-4 py-2 rounded-lg text-sm flex items-center gap-2" id="addTaskBtn">
        <i class="fa-solid fa-plus"></i> مهمة جديدة
    </button>
</nav>

<div class="max-w-7xl mx-auto px-4 py-6">
    <div class="tabs-bar" id="tabsContainer">
        <div class="text-sm text-gray-500 py-2 w-full text-center"><i class="fa-solid fa-spinner fa-spin ml-2"></i>جاري التحميل...</div>
    </div>
    <div id="taskContent">
        <div class="content-card text-center text-gray-500 mt-6">
            <i class="fa-solid fa-clipboard-list text-5xl mb-3 opacity-30"></i>
            <p>اختر مهمة من الأعلى أو أنشئ مهمة جديدة</p>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="newTaskModal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="flex justify-between items-center p-5 border-b border-[var(--border)]">
            <h3 class="font-bold text-white text-lg"><i class="fa-solid fa-plus ml-2 text-[var(--gold)]"></i>إنشاء مهمة افتقاد</h3>
            <button onclick="closeNewTaskModal()" class="text-gray-500 hover:text-red-400 text-xl"><i class="fa-solid fa-circle-xmark"></i></button>
        </div>
        <div class="p-5 space-y-4">
            <div>
                <label class="form-label">تاريخ المهمة *</label>
                <input type="date" id="newTaskDate" class="form-input">
            </div>
            <div>
                <label class="form-label">القائد المسؤول *</label>
                <select id="taskLeaderSelect" class="form-input" onchange="onLeaderSelected()">
                    <option value="">-- اختر قائد --</option>
                </select>
            </div>
            <div id="scoutsSelectionSection" style="display:none;">
                <div class="flex justify-between items-center mb-2">
                    <label class="form-label" style="margin-bottom:0;">اختر الكشافين *</label>
                    <div class="flex gap-3 text-xs">
                        <button type="button" onclick="selectAllScouts()" class="text-[var(--gold)] hover:underline">تحديد الكل</button>
                        <button type="button" onclick="deselectAllScouts()" class="text-gray-400 hover:text-white hover:underline">إلغاء الكل</button>
                    </div>
                </div>
                <div id="scoutsCheckList" class="border border-[rgba(201,168,76,0.2)] rounded-lg overflow-y-auto" style="max-height:220px;background:var(--dark3);"></div>
                <p class="text-xs text-gray-500 mt-1">تم تحديد <span id="selectedScoutsCount" class="text-[var(--gold)] font-bold">0</span> كشاف</p>
            </div>
            <div>
                <label class="form-label">ملاحظات (اختياري)</label>
                <textarea id="newTaskNotes" class="form-input" rows="2" placeholder="مثال: افتقاد أسبوعي"></textarea>
            </div>
            <div class="flex justify-end gap-2 pt-3 border-t border-[var(--border)]">
                <button onclick="closeNewTaskModal()" class="btn-outline px-4 py-2 rounded-lg text-sm">إلغاء</button>
                <button onclick="createNewTask()" id="createTaskBtn" class="btn-gold px-6 py-2 rounded-lg text-sm">إنشاء المهمة</button>
            </div>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = 'https://xbdprjxvtwfieiqncbez.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhiZHByanh2dHdmaWVpcW5jYmV6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MjI2NDgsImV4cCI6MjA5NTI5ODY0OH0.ptteVMU6OYawOqiQinKg2FQ_fpP-_VdG3BJY6alkgXM';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const currentUser = JSON.parse(localStorage.getItem('scout_leader_session') || 'null');
if (!currentUser) window.location.href = 'index.html';

const isMasterOrGeneral = ['Master','General'].includes(currentUser.role);
const isSectorLeader    = currentUser.role === 'SectorLeader';
const isTroopLeader     = currentUser.role === 'TroopLeader';
const canCreateTasks    = isSectorLeader || isMasterOrGeneral;

let allTasks = [];
let currentTaskId = null;

const troopToSector = {
    'براعم':'براعم',
    'أشبال وزهرات':'ابتدائي','أشبال':'ابتدائي','زهرات':'ابتدائي',
    'مبتدئ ومرشدات':'اعدادي','كشاف مبتدئ':'اعدادي','مرشدات':'اعدادي',
    'متقدم ورائدات':'ثانوي','كشاف متقدم':'ثانوي','رائدات':'ثانوي'
};

const userSector = isSectorLeader ? currentUser.sector
                 : isTroopLeader  ? (troopToSector[currentUser.troop] || null)
                 : null;

if (!canCreateTasks) document.getElementById('addTaskBtn').style.display = 'none';

document.getElementById('sectorLabel').textContent =
    isMasterOrGeneral ? 'كل المجموعة' :
    isSectorLeader    ? 'قطاع ' + userSector :
    'فرقة ' + currentUser.troop;

// ==================== تحميل التابات ====================
async function loadTasks() {
    const tabsContainer = document.getElementById('tabsContainer');
    tabsContainer.innerHTML = '<div class="text-sm text-gray-500 py-2 w-full text-center"><i class="fa-solid fa-spinner fa-spin ml-2"></i>جاري التحميل...</div>';

    let query = supabaseClient.from('follow_up_tasks').select('*').order('task_date', { ascending: false });

    if (isTroopLeader) {
        // قائد الفرقة يشوف بس المهام المعينة ليه بالـ username
        console.log('🔍 TroopLeader filter: assigned_to =', currentUser.username);
        query = query.eq('assigned_to', currentUser.username);
    } else if (isSectorLeader) {
        console.log('🔍 SectorLeader filter: sector =', userSector);
        query = query.eq('sector', userSector);
    }
    // Master/General يشوف الكل

    const { data, error } = await query;
    console.log('📦 Tasks loaded:', data?.length, 'tasks');
    console.log('📦 Raw data:', JSON.stringify(data?.map(t => ({ id: t.id, assigned_to: t.assigned_to, assigned_to_name: t.assigned_to_name, sector: t.sector }))));

    if (error) {
        tabsContainer.innerHTML = '<div class="text-red-400 py-2 w-full text-center text-sm">فشل التحميل: ' + error.message + '</div>';
        return;
    }

    allTasks = data || [];

    if (allTasks.length === 0) {
        tabsContainer.innerHTML = '<div class="text-gray-500 py-2 w-full text-center text-sm">مفيش مهام افتقاد حالياً</div>';
        document.getElementById('taskContent').innerHTML =
            '<div class="content-card text-center text-gray-500 mt-6">' +
            '<i class="fa-solid fa-clipboard-list text-5xl mb-3 opacity-30"></i>' +
            '<p>' + (canCreateTasks ? 'اضغط "مهمة جديدة" لإنشاء أول مهمة' : 'مفيش مهام معينة لك حالياً') + '</p></div>';
        return;
    }

    tabsContainer.innerHTML = '';
    allTasks.forEach((task, index) => {
        const btn = document.createElement('button');
        btn.className = 'tab-btn' + (index === 0 ? ' active' : '');
        btn.dataset.taskId = task.id;
        btn.onclick = () => selectTask(task.id, btn);

        const dateStr = new Date(task.task_date).toLocaleDateString('ar-EG', { day:'numeric', month:'long', year:'numeric' });
        const assignedName = task.assigned_to_name || task.assigned_to || '—';

        btn.innerHTML =
            '<i class="fa-solid fa-calendar-day"></i>' +
            '<span>' + dateStr + '</span>' +
            '<span class="text-xs text-gray-500">(' + assignedName + ')</span>' +
            (canCreateTasks ? '<span onclick="event.stopPropagation();deleteTask(\'' + task.id + '\')" class="text-red-500 opacity-60 hover:opacity-100 mr-1"><i class="fa-solid fa-xmark"></i></span>' : '');
        tabsContainer.appendChild(btn);
    });

    selectTask(allTasks[0].id, tabsContainer.querySelector('.tab-btn'));
}

// ==================== عرض محتوى المهمة ====================
async function selectTask(taskId, btnEl) {
    currentTaskId = taskId;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    if (btnEl) btnEl.classList.add('active');

    const taskContent = document.getElementById('taskContent');
    taskContent.innerHTML = '<div class="content-card text-center text-gray-400 mt-6"><i class="fa-solid fa-spinner fa-spin text-3xl mb-3"></i><p>جاري التحميل...</p></div>';

    const task = allTasks.find(t => t.id === taskId);
    if (!task) return;

    const { data: records, error } = await supabaseClient
        .from('follow_up_records').select('*').eq('task_id', taskId).order('full_name');

    if (error) { taskContent.innerHTML = '<div class="content-card text-center text-red-400 mt-6">فشل تحميل البيانات</div>'; return; }

    const total     = records.length;
    const contacted = records.filter(r => r.contacted).length;
    const pct       = total > 0 ? Math.round((contacted / total) * 100) : 0;
    const dateStr   = new Date(task.task_date).toLocaleDateString('ar-EG', { day:'numeric', month:'long', year:'numeric' });

    taskContent.innerHTML =
        '<div class="content-card mt-4">' +
        '<div class="flex flex-wrap justify-between items-start gap-3 mb-6">' +
        '<div>' +
        '<h2 class="text-xl font-bold text-white mb-1">مهمة افتقاد — ' + dateStr + '</h2>' +
        (task.notes ? '<p class="text-sm text-gray-400 mb-1">' + task.notes + '</p>' : '') +
        '<p class="text-xs text-gray-500">أنشأها: <span class="text-[var(--gold)]">' + task.created_by + '</span></p>' +
        '</div>' +
        '<div class="flex flex-wrap gap-2">' +
        '<span class="assigned-badge"><i class="fa-solid fa-user-tie ml-1"></i>' + (task.assigned_to_name || task.assigned_to) + '</span>' +
        '<span class="stat-badge"><i class="fa-solid fa-users ml-1"></i>' + total + ' كشاف</span>' +
        '<span class="stat-badge" style="background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.3);color:#10b981;">' +
        '<i class="fa-solid fa-check ml-1"></i>' + contacted + '/' + total + ' (' + pct + '%)</span>' +
        '</div></div>' +
        '<div id="scoutsList"></div></div>';

    const scoutsList = document.getElementById('scoutsList');
    if (!records.length) { scoutsList.innerHTML = '<div class="text-center text-gray-500 py-8">مفيش كشافين في المهمة دي</div>'; return; }

    records.forEach(rec => {
        const div = document.createElement('div');
        div.className = 'scout-item' + (rec.contacted ? ' contacted' : '');
        div.innerHTML =
            '<div class="flex items-start gap-4">' +
            '<input type="checkbox" style="width:22px;height:22px;cursor:pointer;accent-color:var(--gold);flex-shrink:0;margin-top:4px;"' +
            (rec.contacted ? ' checked' : '') +
            ' onchange="toggleContacted(\'' + rec.id + '\',this.checked,\'' + taskId + '\')">' +
            '<div class="flex-1 min-w-0">' +
            '<div class="flex flex-wrap justify-between items-start gap-2 mb-2">' +
            '<div>' +
            '<p class="text-white font-bold">' + rec.full_name + '</p>' +
            '<p class="text-sm text-gray-400 font-mono" dir="ltr">' + (rec.phone || 'لا يوجد رقم') + '</p>' +
            '<p class="text-xs text-[var(--gold)]">الكود: ' + rec.scout_id + '</p>' +
            '</div>' +
            (rec.contacted ?
                '<div class="text-xs text-gray-500 text-left">' +
                '<p><i class="fa-solid fa-user text-green-400 ml-1"></i>' + (rec.contacted_by || '—') + '</p>' +
                '<p><i class="fa-solid fa-clock text-green-400 ml-1"></i>' + (rec.contacted_at ? new Date(rec.contacted_at).toLocaleString('ar-EG') : '—') + '</p>' +
                '</div>' : '') +
            '</div>' +
            '<textarea class="form-input text-sm" rows="2" placeholder="ملاحظات الافتقاد..." onchange="updateComments(\'' + rec.id + '\',this.value)">' + (rec.comments || '') + '</textarea>' +
            '</div></div>';
        scoutsList.appendChild(div);
    });
}

async function toggleContacted(recordId, contacted, taskId) {
    const { error } = await supabaseClient.from('follow_up_records').update({
        contacted,
        contacted_by: contacted ? currentUser.full_name : null,
        contacted_at: contacted ? new Date().toISOString() : null
    }).eq('id', recordId);
    if (error) { alert('فشل التحديث: ' + error.message); return; }
    selectTask(taskId, document.querySelector('[data-task-id="' + taskId + '"]'));
}

async function updateComments(recordId, comments) {
    const { error } = await supabaseClient.from('follow_up_records').update({ comments }).eq('id', recordId);
    if (error) alert('فشل حفظ الملاحظات: ' + error.message);
}

async function deleteTask(taskId) {
    if (!confirm('متأكد من حذف المهمة دي؟')) return;
    const { error } = await supabaseClient.from('follow_up_tasks').delete().eq('id', taskId);
    if (error) { alert('فشل الحذف: ' + error.message); return; }
    loadTasks();
}

// ==================== Modal ====================
async function openNewTaskModal() {
    document.getElementById('newTaskDate').value = new Date().toISOString().split('T')[0];
    document.getElementById('newTaskNotes').value = '';
    document.getElementById('scoutsSelectionSection').style.display = 'none';
    document.getElementById('scoutsCheckList').innerHTML = '';
    document.getElementById('selectedScoutsCount').textContent = '0';

    const leaderSelect = document.getElementById('taskLeaderSelect');
    leaderSelect.innerHTML = '<option value="">جاري التحميل...</option>';

    const sectorTroopMap = {
        'براعم':['براعم'],
        'ابتدائي':['أشبال وزهرات','أشبال','زهرات'],
        'اعدادي':['مبتدئ ومرشدات','كشاف مبتدئ','مرشدات'],
        'ثانوي':['متقدم ورائدات','كشاف متقدم','رائدات']
    };
    const allowedTroops = sectorTroopMap[userSector] || [];

    let q = supabaseClient.from('leaders').select('id, full_name, username, troop, role').eq('status', 'نشط');
    if (!isMasterOrGeneral) q = q.eq('role', 'TroopLeader').in('troop', allowedTroops);

    const { data: leaders, error } = await q;
    leaderSelect.innerHTML = '<option value="">-- اختر قائد --</option>';

    if (error || !leaders || leaders.length === 0) {
        leaderSelect.innerHTML = '<option value="">مفيش قادة في القطاع ده</option>';
    } else {
        leaders.forEach(l => {
            const opt = document.createElement('option');
            opt.value = l.username;                              // ← الـ username هو اللي بنفلتر بيه
            opt.textContent = l.full_name + ' — ' + (l.troop || l.role);
            opt.dataset.name     = l.full_name;
            opt.dataset.username = l.username;
            opt.dataset.troop    = l.troop || '';
            leaderSelect.appendChild(opt);
        });
    }
    document.getElementById('newTaskModal').classList.remove('hidden');
}

async function onLeaderSelected() {
    const sel   = document.getElementById('taskLeaderSelect');
    const troop = sel.options[sel.selectedIndex]?.dataset?.troop;
    const section = document.getElementById('scoutsSelectionSection');
    const list    = document.getElementById('scoutsCheckList');

    if (!troop) { section.style.display = 'none'; return; }

    list.innerHTML = '<div class="p-4 text-center text-gray-400 text-sm"><i class="fa-solid fa-spinner fa-spin ml-2"></i>جاري التحميل...</div>';
    section.style.display = 'block';

    const troopStageMap = {
        'براعم':'براعم',
        'أشبال وزهرات':'ابتدائي','أشبال':'ابتدائي','زهرات':'ابتدائي',
        'مبتدئ ومرشدات':'اعدادي','كشاف مبتدئ':'اعدادي','مرشدات':'اعدادي',
        'متقدم ورائدات':'ثانوي','كشاف متقدم':'ثانوي','رائدات':'ثانوي'
    };

    const { data: scouts, error } = await supabaseClient
        .from('scouts').select('scout_id, full_name, personal_phone')
        .eq('school_stage', troopStageMap[troop]).eq('status', 'مقبول').order('full_name');

    if (error || !scouts || scouts.length === 0) {
        list.innerHTML = '<div class="p-4 text-center text-gray-500 text-sm">مفيش كشافين في الفرقة دي</div>';
        return;
    }

    list.innerHTML = '';
    scouts.forEach(s => {
        const div = document.createElement('div');
        div.className = 'flex items-center gap-3 px-4 py-2 border-b border-[rgba(201,168,76,0.08)] last:border-0 hover:bg-[rgba(201,168,76,0.04)]';
        div.innerHTML =
            '<input type="checkbox" class="scout-checkbox" value="' + s.scout_id + '"' +
            ' data-name="' + s.full_name + '" data-phone="' + (s.personal_phone || '') + '"' +
            ' onchange="updateSelectedCount()" style="width:18px;height:18px;cursor:pointer;accent-color:var(--gold);">' +
            '<div class="flex-1">' +
            '<p class="text-white text-sm font-medium">' + s.full_name + '</p>' +
            '<p class="text-gray-500 text-xs font-mono" dir="ltr">' + (s.personal_phone || 'لا يوجد رقم') + '</p>' +
            '</div>';
        list.appendChild(div);
    });
    updateSelectedCount();
}

function updateSelectedCount() {
    document.getElementById('selectedScoutsCount').textContent =
        document.querySelectorAll('.scout-checkbox:checked').length;
}
function selectAllScouts()   { document.querySelectorAll('.scout-checkbox').forEach(c => c.checked = true);  updateSelectedCount(); }
function deselectAllScouts() { document.querySelectorAll('.scout-checkbox').forEach(c => c.checked = false); updateSelectedCount(); }
function closeNewTaskModal() { document.getElementById('newTaskModal').classList.add('hidden'); }

async function createNewTask() {
    const taskDate       = document.getElementById('newTaskDate').value;
    const notes          = document.getElementById('newTaskNotes').value.trim();
    const sel            = document.getElementById('taskLeaderSelect');
    const assignedTo     = sel.value;                                          // username
    const selectedOpt    = sel.options[sel.selectedIndex];
    const assignedToName = selectedOpt?.dataset?.name || assignedTo;

    console.log('🎯 Selected leader option:', {
        value: sel.value,
        dataUsername: selectedOpt?.dataset?.username,
        dataName: selectedOpt?.dataset?.name,
        dataTroop: selectedOpt?.dataset?.troop,
        text: selectedOpt?.textContent
    });

    if (!taskDate)   { alert('من فضلك اختر تاريخ المهمة'); return; }
    if (!assignedTo) { alert('من فضلك اختر القائد المسؤول'); return; }

    const checked = document.querySelectorAll('.scout-checkbox:checked');
    if (!checked.length) { alert('من فضلك اختر كشاف واحد على الأقل'); return; }

    console.log('🚀 Creating task with:', { taskDate, assignedTo, assignedToName, sector: userSector });
    console.log('🚀 Selected scouts:', checked.length);

    const btn = document.getElementById('createTaskBtn');
    btn.disabled = true; btn.textContent = 'جاري الإنشاء...';

    const { data: newTask, error: taskErr } = await supabaseClient
        .from('follow_up_tasks')
        .insert([{
            task_date: taskDate,
            sector: userSector || 'عام',
            created_by: currentUser.full_name,
            assigned_to: assignedTo,
            assigned_to_name: assignedToName,
            notes: notes || null
        }])
        .select().single();

    console.log('📝 INSERT values:', { assignedTo, assignedToName, taskDate, sector: userSector });
    console.log('📝 Task result:', JSON.stringify(newTask));
    console.log('📝 Task error:', taskErr);

    if (taskErr) {
        alert('فشل إنشاء المهمة: ' + taskErr.message);
        btn.disabled = false; btn.textContent = 'إنشاء المهمة';
        return;
    }

    const records = Array.from(checked).map(cb => ({
        task_id: newTask.id,
        scout_id: cb.value,
        full_name: cb.dataset.name,
        phone: cb.dataset.phone || null
    }));

    const { error: recErr } = await supabaseClient.from('follow_up_records').insert(records);
    if (recErr) {
        alert('فشل إضافة الكشافين: ' + recErr.message);
        btn.disabled = false; btn.textContent = 'إنشاء المهمة';
        return;
    }

    alert('تم إنشاء المهمة بنجاح! (' + records.length + ' كشاف) — مُعيَّنة لـ: ' + assignedToName);
    btn.disabled = false; btn.textContent = 'إنشاء المهمة';
    closeNewTaskModal();
    loadTasks();
}

loadTasks();
</script>
</body>
</html>
